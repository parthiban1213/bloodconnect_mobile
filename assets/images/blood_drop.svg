<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <radialGradient id="dropGrad" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#E8344A"/>
      <stop offset="60%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#8B0A1E"/>
    </radialGradient>
    <radialGradient id="glossGrad" cx="35%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Main drop body: tip at top-centre, round belly at bottom -->
  <path d="M50,2 C50,2 4,52 4,78 A46,46 0 0 0 96,78 C96,52 50,2 50,2 Z"
        fill="url(#dropGrad)"/>
  <!-- Gloss overlay -->
  <ellipse cx="34" cy="42" rx="14" ry="20"
           transform="rotate(-20,34,42)"
           fill="url(#glossGrad)"/>
</svg>