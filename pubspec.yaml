name: bloodconnect
description: BloodConnect - HSBlood Donor Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  go_router: ^14.2.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.3.1
  timeago: ^3.6.1
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  file_picker: ^8.1.2
  share_plus: ^7.2.2
  timezone: ^0.9.4          # ← explicit dep for ReminderService

  # ── Firebase Push Notifications ───────────────────────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icons/app_icon2.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon2.png"
